<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Order Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        h1, h2 {
            text-align: center;
        }
        input {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }
        li {
            margin-top: 10px;
            background: #eee;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .deleteBtn {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            width: auto;
            margin-top: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Food Order System</h1>
    <input type="text" id="customer" placeholder="Customer Name">
    <input type="text" id="food" placeholder="Food Item">
    <button onclick="addOrder()">Place Order</button>

    <h2>Orders List</h2>
    <ul id="orderList"></ul>
</div>

<script>
    // ADD ORDER
    async function addOrder() {
        const customer = document.getElementById("customer").value;
        const food = document.getElementById("food").value;

        const response = await fetch("/orders", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ customer, food })
        });

        const data = await response.json();
        alert(data.message);

        document.getElementById("customer").value = "";
        document.getElementById("food").value = "";
        loadOrders();
    }

    // LOAD ORDERS
    async function loadOrders() {
        const response = await fetch("/orders");
        const orders = await response.json();
        const list = document.getElementById("orderList");
        list.innerHTML = "";

        orders.forEach((item, index) => {
            const li = document.createElement("li");
            li.innerHTML = `
                ${item.customer} ordered ${item.food}
                <button class="deleteBtn" onclick="deleteOrder(${index})">Delete</button>
            `;
            list.appendChild(li);
        });
    }

    // DELETE ORDER
    async function deleteOrder(id) {
        await fetch("/orders/" + id, {
            method: "DELETE"
        });
        loadOrders();
    }


    loadOrders();
</script>

</body>
</html>
